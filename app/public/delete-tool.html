<!DOCTYPE html>
<html>
<head>
    <title>Import Session Manager</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 2rem; }
        h1 { color: #58a6ff; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 0.75rem 1rem; border-bottom: 1px solid #21262d; }
        th { color: #8b949e; font-size: 0.75rem; text-transform: uppercase; }
        .btn-delete { background: #da3633; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .btn-delete:hover { background: #f85149; }
        .btn-refresh { background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; margin-bottom: 1rem; }
        .status { padding: 1rem; margin-top: 1rem; border-radius: 6px; display: none; }
        .status.success { display: block; background: rgba(35, 134, 54, 0.2); border: 1px solid #238636; }
        .status.error { display: block; background: rgba(218, 54, 51, 0.2); border: 1px solid #da3633; }
        #loading { color: #8b949e; }
    </style>
</head>
<body>
    <h1>🗂️ Import Session Manager</h1>
    <p style="color:#8b949e">Standalone tool — bypasses Next.js entirely. Uses raw XMLHttpRequest.</p>
    
    <button class="btn-refresh" onclick="loadSessions()">🔄 Refresh Sessions</button>
    <div id="status"></div>
    <div id="loading">Loading sessions...</div>
    <table>
        <thead>
            <tr><th>ID</th><th>File</th><th>Bank</th><th>Status</th><th>Transactions</th><th>Created</th><th>Action</th></tr>
        </thead>
        <tbody id="sessions"></tbody>
    </table>

    <script>
        function loadSessions() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/financials/import?t=' + Date.now(), true);
            xhr.onload = function() {
                var loading = document.getElementById('loading');
                loading.style.display = 'none';
                if (xhr.status === 200) {
                    var sessions = JSON.parse(xhr.responseText);
                    renderSessions(sessions);
                } else {
                    showStatus('Failed to load sessions: ' + xhr.statusText, 'error');
                }
            };
            xhr.onerror = function() {
                showStatus('Network error loading sessions', 'error');
            };
            xhr.send();
        }

        function renderSessions(sessions) {
            var tbody = document.getElementById('sessions');
            if (sessions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#8b949e;padding:2rem">No import sessions found.</td></tr>';
                return;
            }
            var html = '';
            for (var i = 0; i < sessions.length; i++) {
                var s = sessions[i];
                html += '<tr>' +
                    '<td>' + s.id + '</td>' +
                    '<td>' + s.original_filename + '</td>' +
                    '<td>' + (s.bank_name || '-') + '</td>' +
                    '<td style="color:' + (s.status === 'FAILED' ? '#f85149' : '#58a6ff') + '">' + s.status + '</td>' +
                    '<td>' + s.transaction_count + '</td>' +
                    '<td>' + s.created_at + '</td>' +
                    '<td><button class="btn-delete" onclick="deleteSession(' + s.id + ')">Delete #' + s.id + '</button></td>' +
                    '</tr>';
            }
            tbody.innerHTML = html;
        }

        function deleteSession(id) {
            if (!confirm('Delete session ' + id + ' and all its transactions?')) return;
            
            showStatus('Deleting session ' + id + '...', 'success');
            
            var formData = new FormData();
            formData.append('action', 'delete');
            formData.append('id', id);
            
            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/financials/import', true);
            xhr.onload = function() {
                if (xhr.status === 200) {
                    var result = JSON.parse(xhr.responseText);
                    if (result.success) {
                        showStatus('Session ' + id + ' deleted successfully!', 'success');
                        loadSessions();
                    } else {
                        showStatus('Delete failed: ' + (result.error || 'Unknown error'), 'error');
                    }
                } else {
                    showStatus('Delete failed with status ' + xhr.status + ': ' + xhr.responseText, 'error');
                }
            };
            xhr.onerror = function() {
                showStatus('Network error during deletion', 'error');
            };
            xhr.send(formData);
        }

        function showStatus(msg, type) {
            var el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + type;
        }

        loadSessions();
    </script>
</body>
</html>
